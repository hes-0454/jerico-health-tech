# =============================================================================
# 데이터 수집(intake) 에이전트 — egress 최소 권한
# 핵심: 기본 차단(default-deny) 후, 꼭 필요한 목적지만 허용한다.
#   - 이 에이전트만 건강정보 고속도로 / 병원 EMR 도메인에 닿을 수 있다.
#   - 다른 에이전트 파드에는 이 정책을 붙이지 않으므로 외부망이 막힌다.
# 도메인(api.myhealthway.go.kr, fhir.sejong-hospital.example)은 예시 값.
# =============================================================================

# -----------------------------------------------------------------------------
# (A) 표준 NetworkPolicy
# 표준 정책은 FQDN(도메인) 매칭을 못 한다. 그래서 여기서는
#   DNS + 내부 FHIR 서버 + 외부용 egress 게이트웨이까지만 연다.
# 외부 도메인 allowlist는 아래 (B) CiliumNetworkPolicy(toFQDNs)로 처리한다.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-intake-egress
  namespace: icp
spec:
  podSelector:
    matchLabels:
      app: agent-intake          # 이 라벨을 가진 파드에만 적용
  policyTypes: [Egress]          # egress 규칙이 있으면 나머지는 암묵적 차단
  egress:
    # 1) DNS 조회 (kube-dns) — 이름 해석에 필수
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # 2) 내부 FHIR 서버 (KR Core / ICP 프로파일) — 정규화된 리소스 write 대상
    - to:
        - podSelector:
            matchLabels:
              app: fhir-server
      ports:
        - { protocol: TCP, port: 8443 }
    # 3) 외부(고속도로 / 병원 EMR)로 나가는 egress 게이트웨이 경유
    #    게이트웨이에서 TLS 종단·감사·도메인 재확인을 한 번 더 건다.
    - to:
        - podSelector:
            matchLabels:
              app: egress-gateway
      ports:
        - { protocol: TCP, port: 8080 }
  # 위 3개 외의 모든 egress(다른 파드, 임의 인터넷)는 차단된다.

---
# -----------------------------------------------------------------------------
# (B) CiliumNetworkPolicy — 외부 도메인 allowlist (권장)
# toFQDNs로 "이 두 도메인 외에는 외부로 못 나간다"를 명시적으로 강제.
# Cilium CNI가 필요하다. (vanilla NetworkPolicy로는 불가능)
# 게이트웨이 없이 파드에서 직접 외부로 보낼 때 이 방식을 쓴다.
# -----------------------------------------------------------------------------
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: agent-intake-fqdn
  namespace: icp
spec:
  endpointSelector:
    matchLabels:
      app: agent-intake
  egress:
    # DNS — toFQDNs가 동작하려면 DNS 가시성이 필요
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: ANY }
          rules:
            dns:
              - matchPattern: "*"
    # 건강정보 고속도로 API (예시 도메인)
    - toFQDNs:
        - matchName: "api.myhealthway.go.kr"
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
    # 병원 EMR FHIR 엔드포인트 (예시 도메인)
    - toFQDNs:
        - matchName: "fhir.sejong-hospital.example"
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
    # 그 외 외부 도메인은 모두 차단 — 예: 임의 인터넷, 다른 병원 EMR
